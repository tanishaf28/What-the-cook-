<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What the Cook?!</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #fef6e4 0%, #f3d2c1 100%);
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 620px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 { margin-top: 0; font-size: 28px; color: #2d2d2d; }

    .subtitle { color: #888; margin-bottom: 24px; margin-top: 4px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #eee;
      border-radius: 12px;
      font-size: 14px;
      margin-bottom: 8px;
      transition: border-color 0.2s;
      color: #2d2d2d;
    }

    input[type="password"]:focus { outline: none; border-color: #f3a683; }

    textarea {
      width: 100%;
      min-height: 100px;
      padding: 14px;
      border: 2px solid #eee;
      border-radius: 12px;
      font-size: 15px;
      resize: vertical;
      margin-bottom: 16px;
      transition: border-color 0.2s;
      color: #2d2d2d;
    }

    textarea:focus { outline: none; border-color: #f3a683; }

    button {
      background: #f3a683;
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover:not(:disabled) { background: #ec8b66; transform: translateY(-1px); }
    button:active:not(:disabled) { transform: translateY(0); }
    button:disabled { background: #ccc; cursor: not-allowed; }

    .divider { border: none; border-top: 1px solid #f0f0f0; margin: 24px 0; }

    #result-container { margin-top: 4px; line-height: 1.7; }

    .recipe-card {
      background: #fffaf7;
      border: 1.5px solid #f3d2c1;
      border-radius: 16px;
      padding: 24px;
    }

    .recipe-title { font-size: 22px; font-weight: 700; margin-bottom: 16px; color: #2d2d2d; }

    .recipe-section-label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #f3a683;
      margin-bottom: 8px;
      margin-top: 16px;
    }

    .recipe-card ul, .recipe-card ol { margin: 0; padding-left: 20px; }
    .recipe-card li { margin-bottom: 6px; color: #444; }

    .loading {
      text-align: center;
      color: #aaa;
      padding: 30px 20px;
      font-size: 15px;
    }

    .loading-spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid #f3d2c1;
      border-top-color: #f3a683;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      background: #fde8e8;
      color: #c0392b;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
    }

    .key-hint { font-size: 12px; color: #aaa; margin-top: 0; margin-bottom: 20px; }
    .key-hint a { color: #f3a683; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🍳 What the Cook?!</h1>
    <p class="subtitle">Type your ingredients — get a recipe instantly.</p>

    <label for="api-key-input">Groq API Key</label>
    <input type="password" id="api-key-input" placeholder="gsk_..." />
    <p class="key-hint">
      Free key at <a href="https://console.groq.com" target="_blank">console.groq.com</a>
      — never stored, only used in this tab.
    </p>

    <label for="ingredients-input">Your Ingredients</label>
    <textarea
      id="ingredients-input"
      placeholder="e.g. chicken breast, rice, broccoli, soy sauce, garlic"
    ></textarea>

    <button id="generate-btn">Generate Recipe</button>

    <div id="result-container"></div>
  </div>

  <script>
    const generateBtn = document.getElementById("generate-btn");
    const ingredientsInput = document.getElementById("ingredients-input");
    const apiKeyInput = document.getElementById("api-key-input");
    const resultContainer = document.getElementById("result-container");

    generateBtn.addEventListener("click", generateRecipe);

    ingredientsInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        generateRecipe();
      }
    });

    async function generateRecipe() {
      const ingredients = ingredientsInput.value.trim();
      const apiKey = apiKeyInput.value.trim();

      if (!apiKey) {
        resultContainer.innerHTML = `<div class="error">Please enter your Groq API key above.</div>`;
        apiKeyInput.focus();
        return;
      }

      if (!ingredients) {
        resultContainer.innerHTML = `<div class="error">Please enter some ingredients first!</div>`;
        ingredientsInput.focus();
        return;
      }

      generateBtn.disabled = true;
      generateBtn.textContent = "Cooking up ideas...";
      resultContainer.innerHTML = `
        <hr class="divider">
        <div class="loading">
          <span class="loading-spinner"></span>
          Thinking of something delicious...
        </div>
      `;

      try {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${apiKey}`,
          },
          body: JSON.stringify({
            model: "llama-3.1-8b-instant",
            messages: [
              {
                role: "user",
                content: `You are a helpful cooking assistant. Based on these ingredients: ${ingredients}, suggest one creative recipe. Format your response exactly like this:

TITLE: [recipe name]
INGREDIENTS:
- [ingredient 1]
- [ingredient 2]
STEPS:
1. [step one]
2. [step two]

Keep it realistic and only use common pantry staples in addition to what was listed. Do not deviate from this format.`,
              },
            ],
          }),
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          throw new Error(err.error?.message || `API error ${response.status}`);
        }

        const data = await response.json();
        const recipe = data.choices[0].message.content;
        displayRecipe(recipe);

      } catch (error) {
        console.error(error);
        const message = (error.message || "").includes("401")
          ? "Invalid API key. Double-check your key at console.groq.com."
          : error.message || "Something went wrong. Please try again.";
        resultContainer.innerHTML = `<hr class="divider"><div class="error">${message}</div>`;
      } finally {
        generateBtn.disabled = false;
        generateBtn.textContent = "Generate Recipe";
      }
    }

    function displayRecipe(text) {
      const titleMatch = text.match(/TITLE:\s*(.+)/);
      const ingredientsMatch = text.match(/INGREDIENTS:\s*([\s\S]*?)STEPS:/);
      const stepsMatch = text.match(/STEPS:\s*([\s\S]*)/);

      const title = titleMatch ? titleMatch[1].trim() : "Your Recipe";

      const ingredientsList = ingredientsMatch
        ? ingredientsMatch[1].trim()
            .split("\n")
            .filter(line => line.trim())
            .map(line => `<li>${line.replace(/^[-•]/, "").trim()}</li>`)
            .join("")
        : "";

      const stepsList = stepsMatch
        ? stepsMatch[1].trim()
            .split("\n")
            .filter(line => line.trim())
            .map(line => `<li>${line.replace(/^\d+[\.\)]/, "").trim()}</li>`)
            .join("")
        : "";

      resultContainer.innerHTML = `
        <hr class="divider">
        <div class="recipe-card">
          <div class="recipe-title">${title}</div>
          <div class="recipe-section-label">Ingredients</div>
          <ul>${ingredientsList}</ul>
          <div class="recipe-section-label">Steps</div>
          <ol>${stepsList}</ol>
        </div>
      `;
    }
  </script>
</body>
</html>
